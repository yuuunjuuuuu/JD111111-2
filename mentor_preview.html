<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>강사 소개 미리보기</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
</head>
<body style="margin:0; background:#0f172a;">
  <section class="section mentor-section" style="padding:60px 0;">
    <div class="container">
      <div class="section-header">
        <span class="tag">강사 소개</span>
        <h2>누가 가르치나요?</h2>
      </div>
      <div class="mentor-layout">
        <div class="mentor-left">
          <span class="mentor-badge">데이터 사이언스 전문가</span>
          <h2 class="mentor-name">이윤주</h2>
          <p class="mentor-quote">
            "데이터 분석은 누구나 할 수 있습니다.<br />
            중요한 것은 <strong>'어떤 데이터를 어떻게 볼 것인가'</strong>를<br />
            아는 힘입니다.<br /><br />
            실무에서 실제로 요구되는 데이터 분석 역량을<br />
            체계적으로 전수해 드립니다."
          </p>
        </div>
        <div class="mentor-right">
          <div class="mentor-card">
            <h4>강사 약력</h4>
            <ul class="mentor-timeline">
              <li>
                <span class="mentor-dot"></span>
                <div><strong>에스케이와이(SKY) 대학교 졸업</strong></div>
              </li>
              <li>
                <span class="mentor-dot"></span>
                <div>
                  <strong>뉴욕대학교 (NYU) 석사 졸업</strong>
                  <span>데이터 사이언스 전공</span>
                </div>
              </li>
              <li>
                <span class="mentor-dot"></span>
                <div>
                  <strong>前 대형 아이티(IT) 기업</strong>
                  <span>데이터 / 시스템 엔지니어</span>
                </div>
              </li>
              <li>
                <span class="mentor-dot"></span>
                <div>
                  <strong>現 대학 · 기업 출강</strong>
                  <span>데이터 분석 강사</span>
                </div>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
